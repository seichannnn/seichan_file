<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DropLink - 簡単ファイル共有</title>
    <!-- Tailwind CSS (デザイン用) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons (アイコン用) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* ドラッグ＆ドロップ時のスタイル */
        .drag-active {
            border-color: #6366f1 !important; /* indigo-500 */
            background-color: #e0e7ff !important; /* indigo-50 */
        }
        /* 隠す用のクラス */
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col items-center justify-center p-4">

    <!-- ヘッダー -->
    <div class="fixed top-0 left-0 w-full p-4 flex justify-center pointer-events-none">
        <h1 class="text-2xl font-black tracking-tight text-indigo-600 flex items-center gap-2">
            <i data-lucide="cloud-upload"></i> DropLink
        </h1>
    </div>

    <!-- ==========================================
         1. アップロード画面 (トップページ)
    =========================================== -->
    <div id="uploadView" class="w-full max-w-lg bg-white rounded-3xl shadow-xl p-6 sm:p-10 transition-all duration-300">
        <div class="text-center mb-8">
            <h2 class="text-2xl font-bold text-gray-900 mb-2">ファイルをアップロード</h2>
            <p class="text-sm text-gray-500">画像や動画を選択して、共有リンクを作成しましょう。</p>
        </div>

        <!-- ドラッグ＆ドロップエリア -->
        <div id="dropZone" class="border-2 border-dashed border-gray-300 rounded-2xl p-8 text-center cursor-pointer hover:bg-gray-50 transition-colors duration-200">
            <div id="uploadPrompt">
                <i data-lucide="folder-up" class="w-12 h-12 text-gray-400 mx-auto mb-4"></i>
                <p class="font-medium text-gray-700">クリックしてファイルを選択</p>
                <p class="text-xs text-gray-400 mt-2">または、ここにファイルをドラッグ＆ドロップ</p>
                <p class="text-xs text-gray-400 mt-1">対応: 画像, 動画 (最大 10GBまで)</p>
            </div>
            <!-- プレビュー表示エリア -->
            <div id="previewContainer" class="hidden flex flex-col items-center">
                <div id="previewMedia" class="w-full max-h-48 rounded-lg overflow-hidden bg-black flex items-center justify-center mb-4">
                    <!-- 画像または動画がここに表示されます -->
                </div>
                <p id="previewFileName" class="text-sm font-medium text-gray-700 truncate w-full"></p>
                <p id="previewFileSize" class="text-xs text-gray-500 mb-4"></p>
                <button id="cancelBtn" class="text-sm text-red-500 hover:text-red-700 font-medium">キャンセル</button>
            </div>
            <!-- 非表示のファイルインプット -->
            <input type="file" id="fileInput" class="hidden" accept="image/*,video/*,.avi">
        </div>

        <!-- アクションボタン -->
        <button id="uploadBtn" class="w-full mt-6 bg-indigo-600 text-white font-bold py-3 px-4 rounded-xl hover:bg-indigo-700 transition duration-200 disabled:opacity-50 disabled:cursor-not-allowed flex justify-center items-center gap-2" disabled>
            <i data-lucide="link"></i> 共有リンクを生成する
        </button>

        <!-- リンク生成結果エリア -->
        <div id="resultArea" class="mt-6 hidden animate-fade-in">
            <div class="bg-green-50 border border-green-200 rounded-xl p-4">
                <p class="text-sm font-bold text-green-700 mb-2 flex items-center gap-1">
                    <i data-lucide="check-circle" class="w-4 h-4"></i> リンクの生成が完了しました！
                </p>
                <div class="flex items-center gap-2 bg-white rounded-lg border border-gray-200 p-1 pl-3">
                    <input type="text" id="shareUrlInput" class="flex-1 bg-transparent text-sm text-gray-600 outline-none" readonly>
                    <button id="copyBtn" class="bg-indigo-100 text-indigo-700 hover:bg-indigo-200 p-2 rounded-md transition tooltip-trigger relative">
                        <i data-lucide="copy" class="w-4 h-4"></i>
                    </button>
                </div>
                <p id="copyMessage" class="text-xs text-green-600 font-medium mt-2 hidden text-center">クリップボードにコピーしました！</p>
            </div>
        </div>
    </div>


    <!-- ==========================================
         2. ビューアー画面 (リンクを開いた時)
    =========================================== -->
    <div id="downloadView" class="hidden w-full max-w-3xl bg-white rounded-3xl shadow-xl overflow-hidden transition-all duration-300">
        <div id="viewerLoading" class="p-16 text-center">
            <i data-lucide="loader-2" class="w-10 h-10 text-indigo-500 animate-spin mx-auto mb-4"></i>
            <p class="text-gray-500 font-medium">ファイルを読み込んでいます...</p>
        </div>

        <div id="viewerContent" class="hidden flex flex-col md:flex-row h-full max-h-[80vh]">
            <!-- メディア表示エリア -->
            <div class="flex-1 bg-gray-900 flex items-center justify-center p-4 min-h-[300px] relative">
                <div id="viewerMediaContainer" class="w-full h-full flex items-center justify-center">
                    <!-- 画像か動画がここに入ります -->
                </div>
            </div>
            
            <!-- 情報＆ダウンロードエリア -->
            <div class="w-full md:w-80 bg-white p-6 flex flex-col justify-between border-l border-gray-100">
                <div>
                    <h3 class="font-bold text-gray-900 text-lg mb-1" id="viewerFileName">ファイル名</h3>
                    <p class="text-sm text-gray-500 mb-6" id="viewerFileSize">サイズ</p>
                    
                    <div class="bg-gray-50 rounded-lg p-4 mb-6">
                        <p class="text-xs text-gray-500 mb-1">アップロード日時</p>
                        <p class="text-sm font-medium text-gray-700" id="viewerDate">--</p>
                    </div>
                </div>

                <div class="space-y-3">
                    <button id="downloadBtn" class="w-full bg-indigo-600 text-white font-bold py-3 px-4 rounded-xl hover:bg-indigo-700 transition duration-200 flex justify-center items-center gap-2 shadow-lg shadow-indigo-200">
                        <i data-lucide="download"></i> ダウンロード
                    </button>
                    <a href="?" class="w-full bg-white border border-gray-300 text-gray-700 font-bold py-3 px-4 rounded-xl hover:bg-gray-50 transition duration-200 flex justify-center items-center gap-2 text-center">
                        新しくアップロード
                    </a>
                </div>
            </div>
        </div>

        <!-- エラー画面 -->
        <div id="viewerError" class="hidden p-16 text-center">
            <i data-lucide="alert-circle" class="w-12 h-12 text-red-400 mx-auto mb-4"></i>
            <h3 class="text-xl font-bold text-gray-900 mb-2">ファイルが見つかりません</h3>
            <p class="text-gray-500 mb-6 text-sm">リンクが間違っているか、ファイルの有効期限が切れています。</p>
            <a href="?" class="inline-block bg-indigo-600 text-white font-bold py-2 px-6 rounded-xl hover:bg-indigo-700 transition">
                トップに戻る
            </a>
        </div>
    </div>

    <script>
        // アイコンの初期化
        lucide.createIcons();

        // プレビュー環境でのフルスクリーンエラーを抑制する
        window.addEventListener('unhandledrejection', (event) => {
            if (event.reason && (event.reason.name === 'TypeError' || (event.reason.message && event.reason.message.toLowerCase().includes('fullscreen')))) {
                event.preventDefault();
                console.warn('この環境ではフルスクリーン表示が制限されています。');
            }
        });

        // ==========================================
        // 【重要】あなたのパソコンのサーバーURLを設定します
        // ※ローカルでテストする時は 'http://localhost:3000'
        // ※Vercelから通信する時は 'https://xxxx.ngrok-free.app' のようなngrokのURLに変更してください
        // ==========================================
        const BACKEND_URL = 'https://signatureless-unbathed-ria.ngrok-free.dev';

        // --- ユーティリティ ---
        function formatBytes(bytes, decimals = 2) {
            if (!+bytes) return '0 Bytes';
            const k = 1024;
            const dm = decimals < 0 ? 0 : decimals;
            const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return `${parseFloat((bytes / Math.pow(k, i)).toFixed(dm))} ${sizes[i]}`;
        }

        // --- 状態管理 ---
        let currentFile = null;
        let currentSafeType = '';
        let objectUrlForPreview = null;

        // --- DOM要素の取得 ---
        const uploadView = document.getElementById('uploadView');
        const downloadView = document.getElementById('downloadView');
        
        // アップロード関連
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const uploadPrompt = document.getElementById('uploadPrompt');
        const previewContainer = document.getElementById('previewContainer');
        const previewMedia = document.getElementById('previewMedia');
        const previewFileName = document.getElementById('previewFileName');
        const previewFileSize = document.getElementById('previewFileSize');
        const cancelBtn = document.getElementById('cancelBtn');
        const uploadBtn = document.getElementById('uploadBtn');
        const resultArea = document.getElementById('resultArea');
        const shareUrlInput = document.getElementById('shareUrlInput');
        const copyBtn = document.getElementById('copyBtn');
        const copyMessage = document.getElementById('copyMessage');

        // ビューアー関連
        const viewerLoading = document.getElementById('viewerLoading');
        const viewerContent = document.getElementById('viewerContent');
        const viewerError = document.getElementById('viewerError');
        const viewerMediaContainer = document.getElementById('viewerMediaContainer');
        const viewerFileName = document.getElementById('viewerFileName');
        const viewerFileSize = document.getElementById('viewerFileSize');
        const viewerDate = document.getElementById('viewerDate');
        const downloadBtn = document.getElementById('downloadBtn');

        // ==========================================
        // ルーティング処理 (URLのパラメータを見て画面を切り替える)
        // ==========================================
        const urlParams = new URLSearchParams(window.location.search);
        const fileIdToView = urlParams.get('id');

        if (fileIdToView) {
            uploadView.classList.add('hidden');
            downloadView.classList.remove('hidden');
            loadSharedFile(fileIdToView);
        } else {
            uploadView.classList.remove('hidden');
            downloadView.classList.add('hidden');
        }

        // ==========================================
        // アップロード画面のロジック
        // ==========================================
        
        // クリックでファイル選択
        dropZone.addEventListener('click', (e) => {
            if (e.target !== cancelBtn && !currentFile) {
                fileInput.click();
            }
        });

        // ドラッグ＆ドロップ対応
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            if (!currentFile) dropZone.classList.add('drag-active');
        });
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('drag-active');
        });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-active');
            if (e.dataTransfer.files.length > 0 && !currentFile) {
                handleFileSelect(e.dataTransfer.files[0]);
            }
        });

        // inputからのファイル選択
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFileSelect(e.target.files[0]);
            }
        });

        // ファイルが選択された時の処理
        function handleFileSelect(file) {
            // 最大 10GB (10 * 1024 * 1024 * 1024 バイト) に制限を引き上げ
            const MAX_SIZE = 10 * 1024 * 1024 * 1024; 
            if (file.size > MAX_SIZE) {
                alert("申し訳ありません。10GB以下のファイルのみ対応しています。");
                return;
            }

            // ファイルタイプの推測 (MIMEタイプが空になるAVI等の対策)
            let safeType = file.type;
            if (!safeType) {
                const ext = file.name.split('.').pop().toLowerCase();
                if (['mp4', 'avi', 'mov', 'wmv', 'flv', 'mkv'].includes(ext)) safeType = 'video/' + ext;
                else if (['jpg', 'jpeg', 'png', 'gif', 'webp'].includes(ext)) safeType = 'image/' + ext;
            }

            // 画像か動画か簡易チェック
            if (!safeType.startsWith('image/') && !safeType.startsWith('video/')) {
                alert("画像または動画ファイルのみ対応しています。");
                return;
            }

            currentFile = file;
            currentSafeType = safeType;
            uploadPrompt.classList.add('hidden');
            previewContainer.classList.remove('hidden');
            uploadBtn.disabled = false;
            resultArea.classList.add('hidden'); // 前の結果を隠す

            // 以前の警告文があれば削除
            const oldWarn = document.getElementById('aviWarning');
            if (oldWarn) oldWarn.remove();

            previewFileName.textContent = file.name;
            previewFileSize.textContent = formatBytes(file.size);

            // プレビューの表示
            if (objectUrlForPreview) URL.revokeObjectURL(objectUrlForPreview);
            objectUrlForPreview = URL.createObjectURL(file);
            previewMedia.innerHTML = ''; // クリア

            const ext = file.name.split('.').pop().toLowerCase();
            const playableExts = ['mp4', 'webm', 'ogg', 'mov'];

            if (safeType.startsWith('image/')) {
                const img = document.createElement('img');
                img.src = objectUrlForPreview;
                img.className = "max-h-48 max-w-full object-contain";
                previewMedia.appendChild(img);
            } else if (safeType.startsWith('video/')) {
                if (playableExts.includes(ext)) {
                    const video = document.createElement('video');
                    video.src = objectUrlForPreview;
                    video.className = "max-h-48 max-w-full object-contain";
                    video.controls = true;
                    video.playsInline = true;
                    video.setAttribute('controlsList', 'nofullscreen');
                    previewMedia.appendChild(video);
                } else {
                    // 再生非対応形式（AVI等）の場合
                    previewMedia.innerHTML = `
                        <div class="flex flex-col items-center justify-center h-full p-6 text-gray-400">
                            <i data-lucide="file-video" class="w-12 h-12 mb-2"></i>
                            <span class="text-xs">プレビュー非対応</span>
                        </div>
                    `;
                }

                // AVIなどはブラウザで再生できないことが多いので注意書きを追加
                if (!playableExts.includes(ext)) {
                    const warn = document.createElement('p');
                    warn.id = 'aviWarning';
                    warn.className = "text-xs text-yellow-600 mt-2 w-full text-center font-bold";
                    warn.textContent = "※この形式はブラウザ上で再生できませんが、共有・ダウンロードは可能です。";
                    previewContainer.insertBefore(warn, previewFileName);
                }
            }
            
            // アイコンの再描画
            lucide.createIcons();
        }

        // キャンセルボタン
        cancelBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            resetUploadArea();
        });

        function resetUploadArea() {
            currentFile = null;
            currentSafeType = '';
            fileInput.value = '';
            uploadPrompt.classList.remove('hidden');
            previewContainer.classList.add('hidden');
            uploadBtn.disabled = true;
            resultArea.classList.add('hidden');
            if (objectUrlForPreview) URL.revokeObjectURL(objectUrlForPreview);

            const oldWarn = document.getElementById('aviWarning');
            if (oldWarn) oldWarn.remove();
        }

        // 「リンクを生成する」ボタンの処理
        uploadBtn.addEventListener('click', async () => {
            if (!currentFile) return;

            // ボタンをローディング状態に
            const originalText = uploadBtn.innerHTML;
            uploadBtn.innerHTML = '<i data-lucide="loader-2" class="animate-spin"></i> アップロード中...';
            uploadBtn.disabled = true;
            lucide.createIcons();

            try {
                // 送信用データの作成 (FormDataを使います)
                const formData = new FormData();
                formData.append('file', currentFile);
                formData.append('name', currentFile.name);
                formData.append('type', currentSafeType);
                formData.append('size', currentFile.size);

                // パソコンのサーバーへPOSTリクエストを送信
                const response = await fetch(`${BACKEND_URL}/api/upload`, {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'ngrok-skip-browser-warning': 'true' // ngrokの警告画面をスキップするパスポート
                    }
                });

                if (!response.ok) {
                    throw new Error('サーバーエラー');
                }

                const result = await response.json();

                // 共有URLを生成 (結果のIDを使用)
                const baseUrl = window.location.href.split('?')[0];
                const shareUrl = `${baseUrl}?id=${result.id}`;

                // 結果を表示
                shareUrlInput.value = shareUrl;
                resultArea.classList.remove('hidden');
                
                // ボタンを元に戻す
                uploadBtn.innerHTML = '<i data-lucide="check"></i> リンク生成完了！';
                lucide.createIcons();

            } catch (error) {
                console.error("保存エラー:", error);
                alert("アップロードに失敗しました。パソコンのサーバーが起動しているか、URLが間違っていないか確認してください。");
                uploadBtn.innerHTML = originalText;
                uploadBtn.disabled = false;
                lucide.createIcons();
            }
        });

        // コピーボタンの処理
        copyBtn.addEventListener('click', () => {
            shareUrlInput.select();
            document.execCommand('copy');
            
            // コピー完了メッセージを表示して数秒で消す
            copyMessage.classList.remove('hidden');
            setTimeout(() => {
                copyMessage.classList.add('hidden');
            }, 3000);
        });


        // ==========================================
        // ビューアー画面のロジック
        // ==========================================
        async function loadSharedFile(id) {
            try {
                // パソコンのサーバーからファイル情報を取得
                const response = await fetch(`${BACKEND_URL}/api/files/${id}`, {
                    headers: {
                        'ngrok-skip-browser-warning': 'true' // ngrokの警告画面をスキップするパスポート
                    }
                });
                
                if (!response.ok) {
                    viewerLoading.classList.add('hidden');
                    viewerError.classList.remove('hidden');
                    return;
                }

                const fileData = await response.json();

                viewerLoading.classList.add('hidden');

                // 成功：UIにデータをセット
                viewerContent.classList.remove('hidden');
                viewerContent.classList.add('flex');

                viewerFileName.textContent = fileData.name;
                viewerFileSize.textContent = formatBytes(fileData.size);
                
                const date = new Date(fileData.timestamp);
                viewerDate.textContent = date.toLocaleString('ja-JP');

                // 以前の警告文があれば削除
                const oldViewerWarn = document.getElementById('viewerAviWarning');
                if (oldViewerWarn) oldViewerWarn.remove();

                const ext = fileData.name.split('.').pop().toLowerCase();
                const playableExts = ['mp4', 'webm', 'ogg', 'mov'];

                // メディアの表示 (クラウドのURLから直接読み込む)
                if (fileData.type.startsWith('image/')) {
                    const img = document.createElement('img');
                    img.src = fileData.downloadUrl;
                    img.className = "max-h-full max-w-full object-contain";
                    viewerMediaContainer.appendChild(img);
                } else if (fileData.type.startsWith('video/')) {
                    if (playableExts.includes(ext)) {
                        const video = document.createElement('video');
                        video.src = fileData.downloadUrl;
                        video.className = "max-h-full max-w-full object-contain";
                        video.controls = true;
                        video.playsInline = true;
                        video.setAttribute('controlsList', 'nofullscreen');
                        viewerMediaContainer.appendChild(video);
                    } else {
                        // ブラウザ再生非対応形式の場合
                        viewerMediaContainer.innerHTML = `
                            <div class="flex flex-col items-center justify-center p-6 text-gray-500">
                                <i data-lucide="file-video" class="w-20 h-20 mb-4 opacity-50"></i>
                                <span class="text-sm font-medium">このブラウザでは直接再生できません</span>
                                <span class="text-xs mt-2">ダウンロードしてご確認ください</span>
                            </div>
                        `;
                    }
                }
                
                lucide.createIcons();

                // ダウンロードボタンの設定
                downloadBtn.addEventListener('click', async () => {
                    const originalText = downloadBtn.innerHTML;
                    downloadBtn.innerHTML = '<i data-lucide="loader-2" class="animate-spin"></i> 準備中...';
                    lucide.createIcons();
                    
                    try {
                        const response = await fetch(fileData.downloadUrl);
                        const blob = await response.blob();
                        const blobUrl = URL.createObjectURL(blob);
                        
                        const a = document.createElement('a');
                        a.href = blobUrl;
                        a.download = fileData.name;
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        URL.revokeObjectURL(blobUrl);
                    } catch (error) {
                        console.error("ダウンロードエラー", error);
                        // セキュリティ制限等で失敗した場合は直接開く
                        window.open(fileData.downloadUrl, '_blank');
                    } finally {
                        downloadBtn.innerHTML = originalText;
                        lucide.createIcons();
                    }
                });

            } catch (error) {
                console.error("読み込みエラー:", error);
                viewerLoading.classList.add('hidden');
                viewerError.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
